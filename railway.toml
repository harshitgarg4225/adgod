# Railway multi-service config. One image, different start commands per service.
# Each service in the Railway project points at this repo; the [build] image is shared.
# See infra/railway/README.md for provisioning order (postgres -> redis -> pgbouncer -> services).
#
# NOTE: Railway typically configures one service per railway.toml via the dashboard or
# per-service config files. This file documents the canonical start commands; replicate
# each [service.*] block as a Railway service with the matching start command.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/python.Dockerfile"

[deploy]
# Default start command (overridden per service below).
startCommand = "python -m leadpilot.bff"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ---------------------------------------------------------------------------
# Canonical per-service start commands (set these as the Custom Start Command
# on each Railway service that deploys this repo/image):
#
#   bff-api          : gunicorn leadpilot.bff.app:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
#   webhook-intake   : gunicorn leadpilot.webhook.app:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
#   closer-worker    : celery -A leadpilot.worker.celery_app worker -Q closer -c 4 -n closer@%h
#   agent-worker     : celery -A leadpilot.worker.celery_app worker -Q agent,optimizer,launch,fatigue -c 4 -n agent@%h
#   cron-dispatch    : celery -A leadpilot.worker.celery_app beat
#   web-next         : (separate Node service) npm run start  (root: web/)
#
# Run DB migrations as a release/pre-deploy step:
#   alembic upgrade head
# ---------------------------------------------------------------------------
