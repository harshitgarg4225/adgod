name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: leadpilot
          POSTGRES_PASSWORD: leadpilot
          POSTGRES_DB: leadpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://leadpilot:leadpilot@localhost:5432/leadpilot
      REDIS_URL: redis://localhost:6379/0
      MOCK_META: "true"
      MOCK_WHATSAPP: "true"
      MOCK_RAZORPAY: "true"
      MOCK_LLM: "true"
      MOCK_OTP: "true"
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Migrate
        run: alembic upgrade head
      - name: Test
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
