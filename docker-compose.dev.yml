# Local dev datastores. pgvector image so `CREATE EXTENSION vector` works.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: leadpilot
      POSTGRES_PASSWORD: leadpilot
      POSTGRES_DB: leadpilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
