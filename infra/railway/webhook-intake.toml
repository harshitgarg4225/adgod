# Railway config-as-code for the `webhook-intake` service (Meta / WhatsApp / Razorpay webhooks).
# In the service: Settings → Config-as-code → path = infra/railway/webhook-intake.toml
# (root directory stays the repo root). Shares the same env group as bff-api.
#
# NOTE: Railway runs startCommand in EXEC form (no shell), so $PORT expansion needs `sh -c`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/python.Dockerfile"

[deploy]
startCommand = 'sh -c "gunicorn leadpilot.webhook.app:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"'
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
